<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilayang Yuni Elementary School – Virtual Map</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a3a8f;
    --blue-dark: #0d1f5c;
    --blue-mid: #2952c4;
    --white: #ffffff;
    --off-white: #f0f4ff;
    --light-blue: #dce8ff;
    --accent: #4a7fff;
    --shadow: 0 8px 32px rgba(13,31,92,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #0d1f5c 0%, #1a3a8f 45%, #2952c4 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 22px 16px 12px;
    background: rgba(255,255,255,0.06);
    border-bottom: 2px solid rgba(255,255,255,0.15);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .school-logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.85);
    box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    background: #fff;
    object-fit: cover;
    flex-shrink: 0;
  }

  .header-text { text-align: left; }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.3rem, 3.5vw, 2.2rem);
    color: var(--white);
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    line-height: 1.15;
  }
  header h1 span {
    color: #a8c4ff;
    font-size: 0.75em;
    display: block;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header p {
    color: #c0d4ff;
    font-size: 0.9rem;
    margin-top: 4px;
    font-weight: 600;
  }

  @media (max-width: 500px) {
    .header-inner { flex-direction: column; gap: 10px; }
    .header-text { text-align: center; }
    .school-logo { width: 70px; height: 70px; }
  }

  #map-container {
    position: relative;
    display: inline-block;
    margin: 18px auto 10px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow), 0 0 0 4px rgba(255,255,255,0.7);
    max-width: 95vw;
  }

  #map-img {
    display: block;
    width: min(900px, 95vw);
    height: auto;
    user-select: none;
  }

  .pin {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--blue-dark);
    border: 2.5px solid var(--white);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.18s, background 0.18s, box-shadow 0.18s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 5;
    line-height: 1;
  }
  .pin:hover {
    transform: translate(-50%, -50%) scale(1.35);
    background: var(--white);
    color: var(--blue-dark);
    box-shadow: 0 4px 18px rgba(255,255,255,0.6);
    z-index: 10;
  }

  /* MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,25,50,0.72);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.22s;
  }
  #modal-overlay.active { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(40px) scale(0.97); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

  #modal {
    background: var(--white);
    border-radius: 20px;
    max-width: 420px;
    width: 92vw;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: slideUp 0.28s cubic-bezier(.22,.68,0,1.2);
    position: relative;
  }

  #modal-header {
    background: linear-gradient(90deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    padding: 18px 52px 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #modal-num {
    background: var(--white);
    color: var(--blue-dark);
    font-family: 'Baloo 2', cursive;
    font-size: 1.3rem;
    font-weight: 800;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #modal-title {
    color: var(--white);
    font-family: 'Baloo 2', cursive;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.25;
  }

  #modal-body {
    padding: 20px 22px 22px;
    background: var(--off-white);
  }

  #modal-photo-wrap {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: var(--light-blue);
    margin-bottom: 12px;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #modal-photo {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    display: block;
  }
  #modal-no-photo {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 32px;
    color: var(--blue-mid);
    font-size: 0.95rem;
    font-weight: 600;
  }
  #modal-no-photo svg { opacity: 0.45; }

  #close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(255,255,255,0.18);
    border: none;
    color: var(--white);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    font-weight: 700;
    line-height: 1;
  }
  #close-btn:hover { background: rgba(255,255,255,0.32); }

  #back-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--blue);
    color: var(--white);
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    border: 2px solid var(--blue-mid);
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, transform 0.12s;
    margin-top: 4px;
  }
  #back-btn:hover { background: var(--blue-dark); transform: scale(1.02); }

  #loading {
    color: #a8c4ff;
    font-size: 0.95rem;
    margin: 10px 0 16px;
    text-align: center;
    min-height: 22px;
  }

  footer {
    color: #7aa0e0;
    font-size: 0.82rem;
    margin: 14px 0 22px;
    text-align: center;
  }
</style>
</head>

let facilities = {};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const data = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const num = parseInt(cols[0]);
    const name = cols[1] ? cols[1].trim().replace(/^"|"$/g, '') : '';
    const photo = cols[2] ? cols[2].trim().replace(/^"|"$/g, '') : '';
    if (num) data[num] = { name, photo };
  }
  return data;
}

function buildPins() {
  const container = document.getElementById('map-container');
  const img = document.getElementById('map-img');

  for (const [num, pos] of Object.entries(PIN_POSITIONS)) {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.textContent = num;
    pin.style.left = pos[0] + '%';
    pin.style.top = pos[1] + '%';
    pin.title = facilities[num]?.name || 'Facility ' + num;
    pin.onclick = () => openModal(parseInt(num));
    container.appendChild(pin);
  }
}

function driveUrl(url) {
  const m = url.match(/[-\w]{25,}/);
  return m ? `https://drive.google.com/uc?export=view&id=${m[0]}` : url;
}

function openModal(num) {
  const f = facilities[num] || { name: 'Facility ' + num, photo: '' };
  document.getElementById('modal-num').textContent = num;
  document.getElementById('modal-title').textContent = f.name;

  const img = document.getElementById('modal-photo');
  const noPhoto = document.getElementById('modal-no-photo');

  if (f.photo && f.photo.length > 5) {
    img.src = driveUrl(f.photo);
    img.style.display = 'block';
    noPhoto.style.display = 'none';
    img.onerror = () => { img.style.display = 'none'; noPhoto.style.display = 'flex'; };
  } else {
    img.style.display = 'none';
    noPhoto.style.display = 'flex';
  }

  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Load CSV
fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    facilities = parseCSV(text);
    document.getElementById('loading').textContent = '';
    buildPins();
  })
  .catch(() => {
    document.getElementById('loading').textContent = '⚠️ Hindi ma-load ang data. I-check ang CSV URL.';
    buildPins();
  });
